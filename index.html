<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Tracker — SBD 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --navy: #0056a8; --navy-mid: #003d7a; --navy-light: #0068cc; --navy-deep: #002952;
            --gold: #ffc107; --gold-light: #ffdd57; --gold-pale: #fff8e1; --gold-dark: #e6a800;
            --green: #28a745; --green-dark: #1e7e34; --green-bg: #e8f5e9;
            --red: #dc3545; --red-dark: #c62828; --red-bg: #fef2f2;
            --orange: #f59e0b; --orange-bg: #fffbeb;
            --teal: #0d9488; --teal-dark: #0f766e;
            --bg: #f0f4f8; --card: #ffffff;
            --text: #0f172a; --text-mid: #475569; --text-light: #94a3b8; --border: #dfe3e8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* HEADER */
        .top-bar { background: var(--navy); padding: 14px 20px; position: sticky; top: 0; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .top-bar-inner { max-width: 540px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-badge { width: 40px; height: 40px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .brand-badge svg { width: 22px; height: 22px; stroke: var(--navy); fill: none; stroke-width: 2.5; }
        .brand-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 3px; line-height: 1; }
        .brand-text p { font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px rgba(16,185,129,0.6); animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{box-shadow:0 0 8px rgba(16,185,129,0.6);}50%{box-shadow:0 0 16px rgba(16,185,129,0.9);} }

        /* TABS */
        .tabs-container { max-width: 540px; margin: 0 auto; padding: 20px 16px 0; }
        .tab-bar { display: flex; background: var(--navy); border-radius: 14px; padding: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 14px 6px; border: none; background: transparent; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; color: rgba(255,255,255,0.4); cursor: pointer; border-radius: 11px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        .tab-btn.signin.active  { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); }
        .tab-btn.signout.active { background: linear-gradient(135deg, var(--green), #34d399); color: #fff; }
        .tab-btn.stats.active   { background: linear-gradient(135deg, var(--teal), #2dd4bf); color: #fff; }

        /* MAIN */
        .main { max-width: 540px; margin: 0 auto; padding: 16px 16px 40px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }

        /* SCANNER CARD */
        .scanner-card { background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 16px; }
        .scanner-header { padding: 16px 20px; display: flex; align-items: center; gap: 10px; }
        .scanner-header.gold { background: linear-gradient(135deg, var(--gold-pale), #fef3c7); border-bottom: 2px solid var(--gold); }
        .scanner-header.green-hd { background: var(--green-bg); border-bottom: 2px solid var(--green); }
        .scanner-header svg { width: 22px; height: 22px; flex-shrink: 0; }
        .scanner-header.gold svg { stroke: var(--gold-dark); }
        .scanner-header.green-hd svg { stroke: var(--green-dark); }
        .scanner-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; }
        .scanner-header.gold .scanner-title { color: var(--gold-dark); }
        .scanner-header.green-hd .scanner-title { color: var(--green-dark); }
        .scanner-body { padding: 20px; }
        #reader-signin, #reader-signout { width: 100%; }
        #reader-signin img, #reader-signout img { display: none !important; }
        #reader-signin, #reader-signout { border: none !important; }
        .scan-overlay { text-align: center; padding: 30px 20px; }
        .scan-overlay svg { width: 64px; height: 64px; margin-bottom: 12px; }
        .scan-overlay p { font-size: 14px; color: var(--text-mid); font-weight: 500; }
        .scan-btn { margin-top: 16px; padding: 14px 32px; border: none; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .scan-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; }
        .scan-btn.gold-btn { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--navy); box-shadow: 0 4px 16px rgba(212,160,23,0.3); }
        .scan-btn.green-btn { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; box-shadow: 0 4px 16px rgba(16,185,129,0.3); }
        .scan-btn.stop-btn { background: var(--red); color: #fff; }
        .scan-btn:hover { transform: translateY(-2px); }

        /* USER CARD */
        .device-card { background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 16px; display: none; }
        .device-card.show { display: block; animation: fadeUp 0.35s ease; }
        .device-card-top { padding: 20px; text-align: center; position: relative; }
        .device-card-top.gold-top   { background: linear-gradient(135deg, var(--navy), var(--navy-mid)); }
        .device-card-top.green-top  { background: linear-gradient(135deg, #065f46, var(--green-dark)); }
        .device-card-top.red-top    { background: linear-gradient(135deg, #991b1b, var(--red-dark)); }
        .device-card-top.orange-top { background: linear-gradient(135deg, #92400e, #b45309); }
        .device-card-top::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:16px; background:var(--card); border-radius:16px 16px 0 0; }
        .device-status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 20px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; margin-bottom: 10px; }
        .badge-register { background: rgba(212,160,23,0.2); color: var(--gold-light); }
        .badge-returned { background: rgba(16,185,129,0.2); color: #6ee7b7; }
        .badge-error    { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .badge-warning  { background: rgba(245,158,11,0.2); color: #fcd34d; }
        .device-status-badge svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
        .device-person { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: #fff; letter-spacing: 2px; line-height: 1.1; }
        .device-phone  { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 4px; font-weight: 500; }
        .device-code-display { margin-top: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 5px; }
        .gold-top .device-code-display   { color: var(--gold); }
        .green-top .device-code-display  { color: #6ee7b7; }
        .red-top .device-code-display    { color: #fca5a5; }
        .orange-top .device-code-display { color: #fcd34d; }
        .device-body { padding: 6px 20px 20px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .info-cell { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
        .info-cell.full { grid-column: span 2; }
        .info-key { font-size: 9px; font-weight: 700; letter-spacing: 1.2px; color: var(--text-light); text-transform: uppercase; margin-bottom: 2px; }
        .info-val { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }

        /* ACTION BUTTONS */
        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .action-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }
        .action-btn.register-action { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--navy); box-shadow: 0 6px 24px rgba(212,160,23,0.3); }
        .action-btn.return-action   { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; box-shadow: 0 6px 24px rgba(16,185,129,0.3); }
        .action-btn:hover { transform: translateY(-2px); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .action-btn .spinner-sm { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MSG CARD */
        .msg-card { background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 16px; display: none; text-align: center; padding: 30px 20px; }
        .msg-card.show { display: block; animation: fadeUp 0.35s ease; }
        .msg-card svg { width: 56px; height: 56px; margin-bottom: 14px; }
        .msg-card.success-msg svg { stroke: var(--green); }
        .msg-card.error-msg   svg { stroke: var(--red); }
        .msg-card.warning-msg svg { stroke: var(--orange); }
        .msg-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 6px; }
        .success-msg .msg-title { color: var(--green-dark); }
        .error-msg   .msg-title { color: var(--red-dark); }
        .warning-msg .msg-title { color: #b45309; }
        .msg-text   { font-size: 14px; color: var(--text-mid); font-weight: 500; line-height: 1.5; }
        .msg-detail { margin-top: 10px; font-size: 12px; color: var(--text-light); }
        .scan-again-btn { margin-top: 20px; padding: 12px 28px; background: var(--navy); color: #fff; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; cursor: pointer; }
        .scan-again-btn:hover { background: var(--navy-mid); }

        /* HISTORY */
        .history-card { background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; }
        .history-header { padding: 14px 20px; background: #f8fafc; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .history-title { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; color: var(--text-mid); }
        .history-count { font-size: 11px; background: var(--navy); color: var(--gold); padding: 3px 10px; border-radius: 10px; font-weight: 700; }
        .history-list { max-height: 260px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; }
        .history-item:last-child { border-bottom: none; }
        .history-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .history-dot.signin  { background: var(--gold); box-shadow: 0 0 6px rgba(212,160,23,0.4); }
        .history-dot.signout { background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,0.4); }
        .history-info { flex: 1; min-width: 0; }
        .history-name { font-weight: 600; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-meta { font-size: 10px; color: var(--text-light); margin-top: 1px; }
        .history-code { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--navy); }
        .history-empty { padding: 30px; text-align: center; font-size: 13px; color: var(--text-light); }

        /* STATS */
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-box { background: var(--card); border-radius: 14px; padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); text-align: center; position: relative; overflow: hidden; }
        .stat-box::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
        .stat-box.navy::before   { background: linear-gradient(90deg, var(--navy), var(--navy-light)); }
        .stat-box.gold-s::before { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
        .stat-box.green-s::before{ background: linear-gradient(90deg, var(--green), #34d399); }
        .stat-box.red-s::before  { background: linear-gradient(90deg, var(--red), #f87171); }
        .stat-box.teal-s::before { background: linear-gradient(90deg, var(--teal), #2dd4bf); }
        .stat-box.full { grid-column: span 2; }
        .stat-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-light); text-transform: uppercase; margin-bottom: 6px; }
        .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; line-height: 1; }
        .stat-box.navy .stat-value   { color: var(--navy); }
        .stat-box.gold-s .stat-value { color: var(--gold-dark); }
        .stat-box.green-s .stat-value{ color: var(--green-dark); }
        .stat-box.red-s .stat-value  { color: var(--red-dark); }
        .stat-box.teal-s .stat-value { color: var(--teal-dark); }
        .stat-sub { font-size: 10px; color: var(--text-light); margin-top: 2px; font-weight: 600; }

        /* USERS TABLE */
        .users-card { background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 16px; }
        .users-header { padding: 14px 20px; background: linear-gradient(135deg, var(--navy-deep), var(--navy-mid)); display: flex; align-items: center; justify-content: space-between; }
        .users-header-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--gold); }
        .users-header-badge { font-size: 10px; background: rgba(255,193,7,0.2); color: var(--gold-light); padding: 4px 12px; border-radius: 10px; font-weight: 700; letter-spacing: 1px; }
        .users-search { padding: 12px 20px; border-bottom: 1px solid var(--border); }
        .users-search input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--text); outline: none; background: #f8fafc; }
        .users-search input:focus { border-color: var(--gold); background: #fff; }
        .users-list { max-height: 400px; overflow-y: auto; }
        .user-item { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 14px; }
        .user-item:last-child { border-bottom: none; }
        .user-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #fff; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-meta { font-size: 11px; color: var(--text-light); margin-top: 2px; display: flex; gap: 10px; }
        .user-days { text-align: right; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--navy); letter-spacing: 1px; }
        .user-days-lbl { font-size: 9px; font-weight: 700; color: var(--text-light); letter-spacing: 1px; }

        /* NOTIF */
        .notif { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-100px); padding: 12px 24px; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); z-index: 9999; transition: transform 0.3s; white-space: nowrap; }
        .notif.show { transform: translateX(-50%) translateY(0); }
        .notif.success { background: var(--green); color: #fff; }
        .notif.error   { background: var(--red); color: #fff; }
        .notif.info    { background: var(--navy); color: var(--gold); }
    </style>
</head>
<body>

<div id="main-app">
<div class="top-bar">
    <div class="top-bar-inner">
        <div class="brand">
            <div class="brand-badge">
                <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            </div>
            <div class="brand-text">
                <h1>ATTENDANCE</h1>
                <p>SBD 2026 · ICF-SL</p>
            </div>
        </div>
<div class="status-dot"></div>
    </div>
</div>

<div class="tabs-container">
    <div class="tab-bar">
        <button class="tab-btn signin active" onclick="switchTab('signin')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            ATTENDANCE
        </button>
        <button class="tab-btn stats" onclick="switchTab('stats')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            STATS
        </button>
    </div>
</div>

<div class="main">

    <!-- ATTENDANCE PANEL -->
    <div class="tab-panel active" id="panel-signin">

        <!-- SCANNER -->
        <div class="scanner-card" id="scan-section">
            <div class="scanner-header gold">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="4" height="4"/></svg>
                <span class="scanner-title">SCAN SBD ID CARD</span>
            </div>
            <div class="scanner-body">
                <div id="scan-area-signin">
                    <div class="scan-overlay" id="overlay-signin">
                        <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="4" height="4"/></svg>
                        <p>Scan a staff ID card to add them</p>
                        <button class="scan-btn gold-btn" onclick="startScan('signin')">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                            START SCANNER
                        </button>
                    </div>
                    <div id="reader-signin" style="display:none;"></div>
                    <div style="text-align:center;display:none;" id="stop-signin">
                        <button class="scan-btn stop-btn" onclick="stopScan('signin')" style="margin-top:12px;">STOP</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- STAFF LIST -->
        <div style="background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.05);overflow:hidden;margin-bottom:16px;">
            <div style="padding:12px 16px;background:linear-gradient(135deg,var(--navy-deep),var(--navy-mid));display:flex;align-items:center;justify-content:space-between;">
                <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);">TODAY'S STAFF</div>
                <span style="background:rgba(255,193,7,.2);color:var(--gold-light);padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;" id="staff-count">0 SCANNED</span>
            </div>
            <div id="staff-list" style="max-height:420px;overflow-y:auto;">
                <div style="padding:30px;text-align:center;font-size:13px;color:var(--text-light);">Scan ID cards to add staff</div>
            </div>
        </div>
    </div>

    <!-- STATS -->
    <div class="tab-panel" id="panel-stats">
        <div class="stats-summary">
            <div class="stat-box navy">
                <div class="stat-label">Total Staff</div>
                <div class="stat-value" id="totalUsers">0</div>
            </div>
            <div class="stat-box gold-s">
                <div class="stat-label">Days Tracked</div>
                <div class="stat-value" id="totalDays">0</div>
            </div>
            <div class="stat-box green-s">
                <div class="stat-label">Full Days</div>
                <div class="stat-value" id="totalFull">0</div>
                <div class="stat-sub">Sign In + Sign Out</div>
            </div>
            <div class="stat-box red-s">
                <div class="stat-label">Half Days</div>
                <div class="stat-value" id="totalHalf">0</div>
                <div class="stat-sub">Sign In Only</div>
            </div>
        </div>

        <div class="users-card">
            <div class="users-header">
                <div class="users-header-title">STAFF ATTENDANCE</div>
                <div class="users-header-badge" id="usersCount">0 STAFF</div>
            </div>

<script>
const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbymRy-M5v0fVLWUjw4IXYhd1oIR2ZvnP_Dzr_iGR-Th0cMIpmE2ntGeujWYH7-C6NHIzA/exec';
const PASSWORD    = 'admin123';

var signIns      = JSON.parse(localStorage.getItem('att_signins')    || '[]');
var signOuts     = JSON.parse(localStorage.getItem('att_signouts')   || '[]');
var scannedToday = JSON.parse(localStorage.getItem('att_scanned_today') || '[]'); // [{code,name,role,district,chiefdom,facility,phone}]
var isLoggedIn   = localStorage.getItem('att_logged_in') === 'true';
var activeUser   = null; // user whose modal is open
var scanners     = {};

// ── PASSWORD ─────────────────────────────────────────────────
function checkPassword() {
    var val = document.getElementById('pwd-input').value;
    if (val === PASSWORD) {
        isLoggedIn = true;
        localStorage.setItem('att_logged_in', 'true');
        document.getElementById('pwd-screen').style.display = 'none';
        document.getElementById('main-app').style.display   = 'block';
        renderStaffList();
    } else {
        document.getElementById('pwd-error').style.display = 'block';
        document.getElementById('pwd-input').value = '';
    }
}

function doLogout() {
    isLoggedIn = false;
    localStorage.removeItem('att_logged_in');
    document.getElementById('main-app').style.display   = 'none';
    document.getElementById('pwd-screen').style.display = 'flex';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-error').style.display = 'none';
}

function getToday() { return new Date().toISOString().split('T')[0]; }

function parseQR(text) {
    try {
        var obj = JSON.parse(text);
        return {
            code:      obj.code || obj.id || obj.ID || text,
            name:      obj.name || obj.Name || obj.fullName || '',
            phone:     obj.phone || obj.Phone || '',
            district:  obj.district || obj.District || '',
            chiefdom:  obj.chiefdom || obj.Chiefdom || '',
            facility:  obj.facility || obj.Facility || '',
            community: obj.community || obj.Community || '',
            role:      obj.role || obj.Role || ''
        };
    } catch(e) {
        return { code: text.trim(), name: '', phone: '', district: '', chiefdom: '', facility: '', community: '', role: '' };
    }
}

// ── TABS ─────────────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
    document.querySelector('.tab-btn.' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    Object.keys(scanners).forEach(function(k){ if(scanners[k]){ try{scanners[k].stop();}catch(e){} scanners[k]=null; } });
    if (tab === 'stats') updateStats();
}

// ── SCANNER ───────────────────────────────────────────────────
function startScan(mode) {
    var overlay  = document.getElementById('overlay-' + mode);
    var readerEl = document.getElementById('reader-' + mode);
    var stopEl   = document.getElementById('stop-' + mode);
    overlay.style.display = 'none';
    readerEl.style.display = 'block';
    stopEl.style.display = 'block';
    if (scanners[mode]) { try{scanners[mode].stop();}catch(e){} }
    var scanner = new Html5Qrcode('reader-' + mode);
    scanners[mode] = scanner;
    scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1 },
        function(decoded) {
            scanner.stop().then(function() {
                scanners[mode] = null;
                readerEl.style.display = 'none';
                stopEl.style.display = 'none';
                overlay.style.display = 'block';
                handleScan(mode, decoded);
            });
        },
        function() {}
    ).catch(function() {
        overlay.style.display = 'block'; readerEl.style.display = 'none'; stopEl.style.display = 'none';
        showNotif('Camera access denied', 'error');
    });
}

function stopScan(mode) {
    if (scanners[mode]) {
        scanners[mode].stop().then(function() {
            scanners[mode] = null;
            document.getElementById('reader-' + mode).style.display = 'none';
            document.getElementById('stop-' + mode).style.display = 'none';
            document.getElementById('overlay-' + mode).style.display = 'block';
        });
    }
}

// ── HANDLE SCAN ───────────────────────────────────────────────
function handleScan(mode, text) {
    var data = parseQR(text);
    if (!data.name && !data.code) { showNotif('Invalid QR — use your SBD ID card', 'error'); return; }
    // Add to today's scanned list if not already there
    var exists = scannedToday.find(function(s){ return s.code === data.code; });
    if (!exists) {
        scannedToday.push(data);
        localStorage.setItem('att_scanned_today', JSON.stringify(scannedToday));
    }
    renderStaffList();
    showNotif('✓ ' + (data.name||data.code) + ' added — tap name to sign in/out', 'success');
    // Open action modal immediately for scanned person
    openActionModal(data);
}


function renderStaffList() {
    var list  = document.getElementById('staff-list');
    var count = document.getElementById('staff-count');
    if (!list) return;
    count.textContent = scannedToday.length + ' SCANNED';
    if (!scannedToday.length) {
        list.innerHTML = '<div style="padding:30px;text-align:center;font-size:13px;color:var(--text-light);">Scan ID cards to add staff</div>';
        return;
    }
    var today = getToday();
    list.innerHTML = scannedToday.map(function(d, idx) {
        var doneIn   = signIns.find(function(s){ return s.code===d.code && s.date===today; });
        var doneOut  = signOuts.find(function(s){ return s.code===d.code && s.date===today; });
        var inTime   = doneIn  ? new Date(doneIn.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
        var outTime  = doneOut ? new Date(doneOut.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
        var inBadge  = doneIn  ? '<span style="background:#e8f5e9;color:#1e7e34;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;">IN '+inTime+'</span>' : '';
        var outBadge = doneOut ? '<span style="background:#fff8e1;color:#8a6500;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;">OUT '+outTime+'</span>' : '';
        var dot = doneIn && doneOut ? '#28a745' : doneIn ? '#c8991a' : '#dc3545';
        var meta = (d.role&&d.district) ? d.role+' · '+d.district : (d.role||d.district||'');
        return '<div data-idx="'+idx+'" onclick="openActionByIdx(this.dataset.idx)" style="padding:14px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px;cursor:pointer;">'
            +'<div style="width:10px;height:10px;border-radius:50%;background:'+dot+';flex-shrink:0;"></div>'
            +'<div style="flex:1;min-width:0;">'
            +'<div style="font-weight:700;font-size:14px;color:var(--text);">'+(d.name||d.code)+'</div>'
            +'<div style="font-size:10px;color:var(--text-light);margin-top:2px;">'+meta+'</div>'
            +'</div>'
            +'<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">'+inBadge+outBadge+'</div>'
            +'</div>';
    }).join('');
}

function openActionModal(d) {
    activeUser = d;
    var today   = getToday();
    var doneIn  = signIns.find(function(s){ return s.code === d.code && s.date === today; });
    var doneOut = signOuts.find(function(s){ return s.code === d.code && s.date === today; });
    document.getElementById('modal-name').textContent = d.name || d.code || '—';
    var _mm=document.getElementById('modal-meta'); if(_mm) _mm.textContent = (d.role||'')+(d.district?' · '+d.district:'')+(d.chiefdom?' · '+d.chiefdom:d.facility?' · '+d.facility:'');
    var statEl = document.getElementById('modal-status');
    statEl.innerHTML = (doneIn  ? '<span style="background:rgba(40,167,69,.25);color:#6ee7b7;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;">IN ' + new Date(doneIn.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + '</span>' : '')
        + (doneOut ? '<span style="background:rgba(255,193,7,.25);color:#fcd34d;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;">OUT ' + new Date(doneOut.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + '</span>' : '');
    var btnIn  = document.getElementById('modal-btn-in');
    var btnOut = document.getElementById('modal-btn-out');
    btnIn.disabled  = !!doneIn;
    btnOut.disabled = !!doneOut || !doneIn;
    btnIn.style.opacity  = doneIn  ? '0.5' : '1';
    btnOut.style.opacity = (doneOut || !doneIn) ? '0.5' : '1';
    btnIn.innerHTML  = doneIn  ? '✅ SIGNED IN'  : 'SIGN IN';
    btnOut.innerHTML = doneOut ? '✅ SIGNED OUT' : 'SIGN OUT';
    document.getElementById('action-modal').style.display = 'flex';
}

function openActionByIdx(idx) {
    var d = scannedToday[parseInt(idx)];
    if (d) openActionModal(d);
}

function closeActionModal() {
    document.getElementById('action-modal').style.display = 'none';
    activeUser = null;
}

function modalSignIn() {
    if (!activeUser) return;
    var d = activeUser, today = getToday();
    var record = { action:'SIGN_IN', code:d.code, name:d.name||'', phone:d.phone||'',
        district:d.district||'', chiefdom:d.chiefdom||'', facility:d.facility||'',
        role:d.role||'', date:today, timestamp:new Date().toISOString() };
    signIns.push(record);
    localStorage.setItem('att_signins', JSON.stringify(signIns));
    submitToSheets(record, function(){});
    showNotif('✅ ' + (d.name||'') + ' signed in at ' + new Date().toLocaleTimeString(), 'success');
    openActionModal(d); renderStaffList(); updateHistory();
}

function modalSignOut() {
    if (!activeUser) return;
    var d = activeUser, today = getToday();
    var record = { action:'SIGN_OUT', code:d.code, name:d.name||'', phone:d.phone||'',
        district:d.district||'', chiefdom:d.chiefdom||'', facility:d.facility||'',
        role:d.role||'', date:today, timestamp:new Date().toISOString() };
    signOuts.push(record);
    localStorage.setItem('att_signouts', JSON.stringify(signOuts));
    submitToSheets(record, function(){});
    showNotif('✅ ' + (d.name||'') + ' signed out at ' + new Date().toLocaleTimeString(), 'success');
    openActionModal(d); renderStaffList(); updateHistory();
}



function updateSessionButtons(data) { if(activeUser && activeUser.code === (data||{}).code) openActionModal(data); renderStaffList(); }




// Keep legacy functions for signout tab compatibility
function handleSignIn(data, today) {}
function handleSignOut(data, today) {}
function confirmSignIn() {}
function confirmSignOut() {}

// ── CONFIRM ───────────────────────────────────────────────────
function confirmSignIn() {

// ── DISPLAY ───────────────────────────────────────────────────

    var badgeIcon = {

        'badge-returned': '<svg viewBox="0 0 24 24" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',

function showMessage(mode, type, title, text, detail) {
    var card = document.getElementById('msg-' + mode);

        success: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="16 8 10 16 7 13"/></svg>',
        error:   '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        warning: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>'
    };
    card.className = 'msg-card show ' + type + '-msg';
    card.innerHTML = icons[type] +
        '<div class="msg-title">' + title + '</div>' +
        '<div class="msg-text">' + text + '</div>' +
        (detail ? '<div class="msg-detail">' + detail + '</div>' : '') +
        '<button class="scan-again-btn" onclick="scanAgain(\'' + mode + '\')">SCAN ANOTHER</button>';
}

function scanAgain(mode) {
    document.getElementById('msg-' + mode).classList.remove('show');
    document.getElementById('device-' + mode).classList.remove('show');
    startScan(mode);
}

// ── GAS SUBMIT ─────────────────────────────────────────────────
function submitToSheets(record, cb) {
    var payload = Object.assign({}, record, { action2: 'handleSignInOut' });
    fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify(payload) })
    .then(function(){ cb(); })
    .catch(function(){ cb(); }); // fail open
}

// ── HISTORY ───────────────────────────────────────────────────
function updateHistory() {
    var today    = getToday();
    var todayIns = signIns.filter(function(s){ return s.date===today; });
    var todayOuts= signOuts.filter(function(s){ return s.date===today; });
    var siEl = document.getElementById('signin-count');  if(siEl)  siEl.textContent  = todayIns.length;
    var soEl = document.getElementById('signout-count'); if(soEl)  soEl.textContent  = todayOuts.length;
    var regEl= document.getElementById('reg-count');     if(regEl) regEl.textContent = todayIns.length;
    var retEl= document.getElementById('ret-count');     if(retEl) retEl.textContent = todayOuts.length;
    renderStaffList();
}


// ── STATS ─────────────────────────────────────────────────────
function getAllUsers() {
    var map = {};
    signIns.forEach(function(s) {
        if (!map[s.code]) map[s.code] = { code:s.code, name:s.name||'Unknown', district:s.district||'', role:s.role||'', dates:{} };
        if (s.name) map[s.code].name = s.name;
        map[s.code].dates[s.date] = { signIn: s.timestamp, signOut: null };
    });
    signOuts.forEach(function(s) {
        if (map[s.code] && map[s.code].dates[s.date]) map[s.code].dates[s.date].signOut = s.timestamp;
    });
    return Object.values(map).map(function(u) {
        var full=0, half=0;
        Object.values(u.dates).forEach(function(d){ if(d.signOut) full++; else half++; });
        return Object.assign({}, u, { fullDays:full, halfDays:half, totalDays:full+half });
    }).sort(function(a,b){ return b.totalDays - a.totalDays; });
}

function updateStats() {
    var users = getAllUsers();
    var allDates = new Set();
    var totalFull=0, totalHalf=0;
    users.forEach(function(u){
        totalFull += u.fullDays; totalHalf += u.halfDays;
        Object.keys(u.dates).forEach(function(d){ allDates.add(d); });
    });
    document.getElementById('totalUsers').textContent = users.length;
    document.getElementById('totalDays').textContent  = allDates.size;
    document.getElementById('totalFull').textContent  = totalFull;
    document.getElementById('totalHalf').textContent  = totalHalf;
    document.getElementById('usersCount').textContent = users.length + ' STAFF';
    renderUsers();
}

function renderUsers() {
    var users  = getAllUsers();
    var search = (document.getElementById('searchUsers').value||'').toLowerCase();
    var filtered = search ? users.filter(function(u){ return (u.name||'').toLowerCase().includes(search)||(u.code||'').toLowerCase().includes(search); }) : users;
    var colors = ['#0056a8','#0d9488','#7c3aed','#dc3545','#e6a800','#1e7e34','#b45309','#6366f1'];
    document.getElementById('usersList').innerHTML = filtered.length ? filtered.map(function(u,i){
        var initials = u.name ? u.name.split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase() : u.code.substring(0,2);
        return '<div class="user-item">' +
            '<div class="user-avatar" style="background:' + colors[i%colors.length] + '">' + initials + '</div>' +
            '<div class="user-info">' +
                '<div class="user-name">' + (u.name||u.code) + '</div>' +
                '<div class="user-meta"><span>' + (u.district||'—') + '</span><span>' + (u.role||'—') + '</span></div>' +
            '</div>' +
            '<div style="text-align:right"><div class="user-days">' + u.totalDays + '</div><div class="user-days-lbl">DAYS</div>' +
            '<div style="font-size:10px;color:var(--text-light);margin-top:2px;">' + u.fullDays + ' full · ' + u.halfDays + ' half</div></div>' +
        '</div>';
    }).join('') : '<div class="history-empty">No matching staff</div>';
}

// ── NOTIF ─────────────────────────────────────────────────────
function showNotif(msg, type) {
    var el = document.getElementById('notif');
    el.textContent = msg;
    el.className = 'notif show ' + (type||'info');
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.className = 'notif'; }, 2500);
}

updateHistory();
</script>
</body>
</html>
